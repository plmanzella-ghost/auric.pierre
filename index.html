<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name</title>

<style>
    body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background-color: #0d0d0d;
        color: #eaeaea;
        line-height: 1.6;
    }

    header {
        padding: 60px 20px 30px;
        text-align: center;
    }

    h1 {
        font-size: 2.5rem;
        font-weight: normal;
        margin-bottom: 10px;
    }

    nav a {
        margin: 0 10px;
        color: #aaa;
        text-decoration: none;
        font-size: 0.9rem;
    }

    nav a:hover {
        color: #fff;
    }

    section {
        max-width: 700px;
        margin: 60px auto;
        padding: 0 20px;
    }

    h2 {
        font-weight: normal;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
        margin-bottom: 20px;
    }

    .poem {
        margin-bottom: 40px;
        white-space: pre-line;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
    }

    .gallery img {
        width: 100%;
        height: auto;
        cursor: pointer;
    }

    footer {
        text-align: center;
        padding: 40px;
        font-size: 0.8rem;
        color: #777;
    }
</style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#poetry">Poetry</a>
        <a href="#photography">Photography</a>
    </nav>
</header>

<section id="about">
    <h2>About</h2>
    <p>
        Write a short paragraph about yourself here. Keep it simple and honest.
    </p>
</section>

<section id="poetry">
    <h2>Poetry</h2>

    <div class="poem">
Title of Poem

First line of your poem
Second line
Third line
    </div>

    <div class="poem">
Another Poem

Words go here
Keep formatting simple
    </div>

</section>

<section id="photography">
    <h2>Photography</h2>

    <div class="gallery">
        <img src="https://via.placeholder.com/400" alt="">
        <img src="https://via.placeholder.com/400" alt="">
        <img src="https://via.placeholder.com/400" alt="">
    </div>

</section>

<footer>
    © 2026
</footer>

</body>
</html>
